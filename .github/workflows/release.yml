name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ORBIT_FEATURES: s3-native,backend-abstraction

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Static musl Linux — single binary, no glibc dependency.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            builder: zigbuild
            binary: orbit
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            builder: zigbuild
            binary: orbit
          # macOS universal2 — single fat binary covering Intel + Apple Silicon.
          - os: macos-latest
            target: universal2-apple-darwin
            archive: tar.gz
            builder: zigbuild
            binary: orbit
          # Windows MSVC — native build, no cross-compile needed.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            builder: cargo
            binary: orbit.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # universal2-apple-darwin is a meta-target; install both halves.
          targets: ${{ matrix.target == 'universal2-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: Install Zig
        if: matrix.builder == 'zigbuild'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build (cargo-zigbuild)
        if: matrix.builder == 'zigbuild'
        run: cargo zigbuild --release --target ${{ matrix.target }} --features ${{ env.ORBIT_FEATURES }}

      - name: Build (cargo)
        if: matrix.builder == 'cargo'
        run: cargo build --release --target ${{ matrix.target }} --features ${{ env.ORBIT_FEATURES }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "staging/${{ matrix.binary }}"

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -C staging -czf "orbit-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" "${{ matrix.binary }}"

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "staging/${{ matrix.binary }}" -DestinationPath "orbit-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: orbit-${{ matrix.target }}
          path: orbit-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'orbit-*' -exec mv {} release/ \;
          cd release
          sha256sum orbit-* > SHA256SUMS
          ls -lh
          echo "--- checksums ---"
          cat SHA256SUMS

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Orbit v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            release/orbit-*
            release/SHA256SUMS
          body: |
            # Orbit v${{ steps.version.outputs.VERSION }}

            ## Installation

            Pick the archive for your platform, extract the `orbit` binary, and move it to a directory on your PATH. SHA-256 checksums for all assets are in `SHA256SUMS`.

            ### Linux (x86_64, static musl)
            ```bash
            curl -L https://github.com/saworbit/orbit/releases/download/${{ github.ref_name }}/orbit-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz | tar xz
            sudo install -m 755 orbit /usr/local/bin/
            orbit --version
            ```

            ### Linux (aarch64, static musl)
            ```bash
            curl -L https://github.com/saworbit/orbit/releases/download/${{ github.ref_name }}/orbit-${{ github.ref_name }}-aarch64-unknown-linux-musl.tar.gz | tar xz
            sudo install -m 755 orbit /usr/local/bin/
            orbit --version
            ```

            ### macOS (universal — Intel + Apple Silicon)
            ```bash
            curl -L https://github.com/saworbit/orbit/releases/download/${{ github.ref_name }}/orbit-${{ github.ref_name }}-universal2-apple-darwin.tar.gz | tar xz
            sudo install -m 755 orbit /usr/local/bin/
            orbit --version
            ```

            ### Windows (x86_64)
            Download `orbit-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip`, extract `orbit.exe`, and add the directory to your PATH.

            ## What's Changed

            See [CHANGELOG.md](https://github.com/saworbit/orbit/blob/main/CHANGELOG.md) for full details.

            ## Documentation

            - **Main README**: https://github.com/saworbit/orbit/blob/main/README.md
            - **Full Documentation**: https://github.com/saworbit/orbit/tree/main/docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
